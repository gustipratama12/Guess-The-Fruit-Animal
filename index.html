<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Animal & Fruit Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f8ff;
    }

    h1 {
      color: #333;
    }

    #game-container {
      margin-top: 30px;
    }

    img {
      width: 200px;
      height: 200px;
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0px); }
      to { transform: translateY(-15px); }
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }

    #score {
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>🎯 Guess the Animal & Fruit</h1>

  <div id="game-container">
    <p id="clue"></p>
    <img id="image" src="">
    <br>
    <input type="text" id="answer" placeholder="Type your answer...">
    <br>
    <button onclick="checkAnswer()">Submit</button>
    <p id="result"></p>
    <p id="score"></p>
  </div>

  <script>
    const questions = [
      { clue: "Big animal with long trunk", answer: "elephant", image: "https://cdn-icons-png.flaticon.com/512/1998/1998610.png" },
      { clue: "Says meow", answer: "cat", image: "https://cdn-icons-png.flaticon.com/512/616/616408.png" },
      { clue: "King of the jungle", answer: "lion", image: "https://cdn-icons-png.flaticon.com/512/616/616430.png" },
      { clue: "Black and white, eats bamboo", answer: "panda", image: "https://cdn-icons-png.flaticon.com/512/616/616412.png" },
      { clue: "Can fly and says tweet", answer: "bird", image: "https://cdn-icons-png.flaticon.com/512/616/616490.png" },
      { clue: "Yellow fruit monkeys love", answer: "banana", image: "https://cdn-icons-png.flaticon.com/512/590/590685.png" },
      { clue: "Red fruit keeps doctor away", answer: "apple", image: "https://cdn-icons-png.flaticon.com/512/415/415682.png" },
      { clue: "Green outside, red inside", answer: "watermelon", image: "https://cdn-icons-png.flaticon.com/512/590/590695.png" },
      { clue: "Small purple fruit", answer: "grape", image: "https://cdn-icons-png.flaticon.com/512/590/590682.png" },
      { clue: "Orange fruit, same name as color", answer: "orange", image: "https://cdn-icons-png.flaticon.com/512/590/590684.png" }
    ];

    let currentIndex = 0;
    let score = 0;

    function loadQuestion() {
      if (currentIndex < questions.length) {
        document.getElementById("clue").innerText = questions[currentIndex].clue;
        document.getElementById("image").src = questions[currentIndex].image;
        document.getElementById("answer").value = "";
        document.getElementById("result").innerText = "";
        document.getElementById("score").innerText = "Score: " + score;
      } else {
        endGame();
      }
    }

    function checkAnswer() {
      let userAnswer = document.getElementById("answer").value.toLowerCase();
      let correctAnswer = questions[currentIndex].answer;

      if (userAnswer === correctAnswer) {
        score++;
        document.getElementById("result").innerText = "✅ Correct!";
        document.getElementById("result").style.color = "green";
      } else {
        document.getElementById("result").innerText = "❌ Wrong! Answer: " + correctAnswer;
        document.getElementById("result").style.color = "red";
      }

      setTimeout(() => {
        currentIndex++;
        loadQuestion();
      }, 1000); // auto next after 1 second
    }

    function endGame() {
      document.getElementById("game-container").innerHTML = `
        <h2>🎉 Game Finished!</h2>
        <p>Your Score: ${score} / ${questions.length}</p>
        <button onclick="restartGame()">Play Again</button>
      `;
    }

    function restartGame() {
      currentIndex = 0;
      score = 0;
      location.reload();
    }

    loadQuestion();
  </script>

</body>
</html>
