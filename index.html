<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Animal & Fruit Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f8ff;
    }

    h1 {
      color: #333;
    }

    #game-container {
      margin-top: 30px;
    }

    img {
      width: 200px;
      height: 200px;
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0px); }
      to { transform: translateY(-15px); }
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>🎯 Guess the Animal & Fruit</h1>

  <div id="game-container">
    <p id="clue">Clue will appear here</p>
    <img id="image" src="" alt="guess image">
    <br>
    <input type="text" id="answer" placeholder="Type your answer...">
    <br>
    <button onclick="checkAnswer()">Submit</button>
    <button onclick="nextQuestion()">Next</button>
    <p id="result"></p>
  </div>

  <script>
    const questions = [
      {
        clue: "This animal is big, has a long trunk",
        answer: "elephant",
        image: "https://cdn-icons-png.flaticon.com/512/1998/1998610.png"
      },
      {
        clue: "This animal says meow",
        answer: "cat",
        image: "https://cdn-icons-png.flaticon.com/512/616/616408.png"
      },
      {
        clue: "Yellow fruit that monkeys love",
        answer: "banana",
        image: "https://cdn-icons-png.flaticon.com/512/590/590685.png"
      },
      {
        clue: "Red fruit, often used in juice",
        answer: "apple",
        image: "https://cdn-icons-png.flaticon.com/512/415/415682.png"
      },
      {
        clue: "Green outside, red inside, many seeds",
        answer: "watermelon",
        image: "https://cdn-icons-png.flaticon.com/512/590/590695.png"
      }
    ];

    let currentIndex = 0;

    function loadQuestion() {
      document.getElementById("clue").innerText = questions[currentIndex].clue;
      document.getElementById("image").src = questions[currentIndex].image;
      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "";
    }

    function checkAnswer() {
      let userAnswer = document.getElementById("answer").value.toLowerCase();
      let correctAnswer = questions[currentIndex].answer;

      if (userAnswer === correctAnswer) {
        document.getElementById("result").innerText = "✅ Correct!";
        document.getElementById("result").style.color = "green";
      } else {
        document.getElementById("result").innerText = "❌ Try again!";
        document.getElementById("result").style.color = "red";
      }
    }

    function nextQuestion() {
      currentIndex = (currentIndex + 1) % questions.length;
      loadQuestion();
    }

    // Load first question
    loadQuestion();
  </script>

</body>
</html>
